services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: vital_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: vital_fitness
      MYSQL_USER: vitaluser
      MYSQL_PASSWORD: vitalpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - vital_network

  # 后端API服务
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vital_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - MODE=release
      - LOG_LEVEL=info
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=vitaluser
      - DB_PASSWORD=vitalpass
      - DB_NAME=vital_fitness
      - JWT_SECRET=vital_fitness_secret_key
      - JWT_EXPIRE=24
    depends_on:
      - mysql
    networks:
      - vital_network

  # 前端H5服务（nginx + API代理）
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vital_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - vital_network

volumes:
  mysql_data:

networks:
  vital_network:
    driver: bridge
